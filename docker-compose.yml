
x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: custom-airflow:2.7.1-python3.11
  user: "${AIRFLOW_UID:-50000}:0"
  env_file:
    - airflow.env
  volumes:
    - ./config:/opt/airflow/config
    - ./dags:/opt/airflow/dags
    - ./data:/opt/airflow/data
    - ./etls:/opt/airflow/etls
    - ./great_expectations:/opt/airflow/great_expectations
    - ./ml_lab:/opt/airflow/ml_lab
    - airflow_logs:/opt/airflow/logs
    - ./pipelines:/opt/airflow/pipelines
    - ./plugins:/opt/airflow/plugins
    - ./tests:/opt/airflow/tests
    - ./utils:/opt/airflow/utils
   # - ./airflow.cfg:/opt/airflow/airflow.cfg
    - ./requirements.txt:/opt/airflow/requirements.txt
  depends_on:
    - postgres
    - redis
    - minio

services:
  postgres:
    image: postgres:14  
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow_reddit
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - ./config/sql/init_metadata.sql:/docker-entrypoint-initdb.d/init_metadata.sql
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data




  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/bronze || true;
      mc mb -p local/silver || true;
      mc mb -p local/gold || true;
      exit 0;
      "

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db init && airflow db upgrade && airflow users create --username admin --firstname admin --lastname admin --role Admin --email airflow@airflow.com --password admin"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    environment:
      AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"
    command: webserver
    ports:
      - "8080:8080"

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler

  airflow-worker:
    <<: *airflow-common
    command: bash -lc "rm -f /opt/airflow/airflow-worker.pid && airflow celery worker"

  statsd-exporter:
    image: prom/statsd-exporter:v0.26.1
    ports:
      - "9102:9102"
      - "9125:9125/udp"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - statsd-exporter
      - cadvisor
      - node-exporter
      - postgres-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:11.2.0
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "9100:9100"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@postgres:5432/airflow_reddit?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      - postgres

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis

  # ── Nessie REST Catalog (Iceberg metadata store) ──────────────────────────
  nessie:
    image: projectnessie/nessie:0.76.3
    ports:
      - "19120:19120"
    environment:
      # Use existing PostgreSQL as Nessie's version store backend
      NESSIE_VERSION_STORE_TYPE: JDBC
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/airflow_reddit
      # Nessie server config
      QUARKUS_HTTP_PORT: 19120
      NESSIE_SERVER_DEFAULT_BRANCH: main
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v1/config"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Trino Query Engine ────────────────────────────────────────────────────
  trino:
    image: trinodb/trino:435
    ports:
      - "8085:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
      - ./trino/config.properties:/etc/trino/config.properties:ro
      - ./trino/jvm.config:/etc/trino/jvm.config:ro
      - ./trino/node.properties:/etc/trino/node.properties:ro
    depends_on:
      nessie:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ── Apache Superset — init (runs once) ───────────────────────────────────
  superset-init:
    image: apache/superset:4.0.2
    environment:
      SUPERSET_SECRET_KEY: "nyc-taxi-superset-secret-2024"
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_CONFIG_PATH: "/app/superset_config.py"
      # PERF-001: Redis URL for cache backend (must match CACHE_CONFIG in superset_config.py)
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - superset_data:/app/superset_home
      - ./superset/superset_config.py:/app/superset_config.py:ro
      - ./superset/init.sh:/app/init.sh:ro
    command: >
      bash -c "
        pip install trino sqlalchemy-trino redis --quiet --no-cache-dir &&
        bash /app/init.sh
      "
    depends_on:
      postgres:
        condition: service_started
      trino:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  # ── Apache Superset — web server ─────────────────────────────────────────
  superset:
    image: apache/superset:4.0.2
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "nyc-taxi-superset-secret-2024"
      SUPERSET_LOAD_EXAMPLES: "no"
      # BUG-025: align gunicorn timeout with SQLLAB_TIMEOUT (300s) in superset_config.py
      GUNICORN_TIMEOUT: "300"
      # BUG-025: point Superset to custom config that overrides default 60s SQLLAB_TIMEOUT
      SUPERSET_CONFIG_PATH: "/app/superset_config.py"
      # PERF-001: Redis URL for cache backend (must match CACHE_CONFIG in superset_config.py)
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - superset_data:/app/superset_home
      # BUG-025: mount custom config overriding SQLLAB_TIMEOUT=300, CACHE_CONFIG, etc.
      - ./superset/superset_config.py:/app/superset_config.py:ro
    command: >
      bash -c "
        pip install trino sqlalchemy-trino redis --quiet --no-cache-dir &&
        gunicorn --bind 0.0.0.0:8088 --workers 2 --worker-class gthread --threads 20 --timeout 300 --limit-request-line 0 --limit-request-field_size 0 'superset.app:create_app()'
      "
    depends_on:
      postgres:
        condition: service_started
      superset-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  airflow_logs:
  minio_data:
  prometheus_data:
  grafana_data:
  superset_data:
  postgres_data:
  redis_data:
  pgadmin_data:
