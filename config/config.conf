[database]
database_host = postgres
database_name = airflow_reddit
database_port = 5432
database_username = postgres
database_password = postgres
database_schema = metadata
database_log_table = ingestion_log
silver_transform_log_table = silver_transform_log
dq_log_table = data_quality_log
silver_file_log_table = silver_file_log
gold_transform_log_table = gold_transform_log
gold_file_log_table = gold_file_log
ml_data_log_table = ml_data_log

[file_paths]
input_path = /opt/airflow/data/input
output_path = /opt/airflow/data/output


[download]
base_url = https://d37ci6vzurychx.cloudfront.net/trip-data/
# Increased from 10 → 120 s; NYC taxi parquet files can exceed 100 MB and
# the previous 10-second limit caused spurious download failures.
time_out = 120

[taxi_type]
service_type = ['Yellow', 'Green']

[minio]
endpoint = minio:9000
access_key = minioadmin
secret_key = minioadmin
secure = false
bronze_bucket = bronze
silver_bucket = silver
gold_bucket = gold

[nessie]
uri = http://nessie:19120/api/v1
ref = main
warehouse = s3a://gold/
catalog_name = nessie

[trino]
host = trino
port = 8085
catalog = iceberg
schema = gold

[layers]
default_layer = bronze



[etl_settings]
batch_size = 100
error_handling = abort
log_level = info

[cleanup]
enabled = true
retention_hours = 6
