# ── PostgreSQL catalog — query metadata tables trực tiếp từ Trino ────────────
# Dùng để JOIN Gold Iceberg data với pipeline metadata (ingestion_log, silver_transform_log...)
#
# Ví dụ query:
#   SELECT g.year, g.month, g.total_trips, i.finished_at
#   FROM iceberg.gold.daily_summary g
#   JOIN postgresql.metadata.ingestion_log i
#     ON g.year = i.year AND g.month = i.month
#   WHERE i.status = 'SUCCESS';

connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/airflow_reddit
connection-user=postgres
connection-password=postgres
