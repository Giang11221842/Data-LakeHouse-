# ── Trino Coordinator Configuration ─────────────────────────────────────────
coordinator=true
node-scheduler.include-coordinator=true
http-server.http.port=8080
discovery.uri=http://localhost:8080

# ── Memory limits — PERF-001 ─────────────────────────────────────────────────
# Increased from 2GB/1GB/4GB to allow larger aggregations on multi-year NYC
# taxi fact_trips table without spilling to disk on every Superset chart query.
#
# query.max-memory:          max memory across all nodes for a single query
# query.max-memory-per-node: max memory on a single node for a single query
# query.max-total-memory:    includes revocable (spill-eligible) memory
query.max-memory=4GB
query.max-memory-per-node=2GB
query.max-total-memory=8GB

# ── Query execution limits (BUG-025) ─────────────────────────────────────────
# Allow queries up to 10 minutes — prevents Trino from running indefinitely
# while Superset SQL Lab timeout (300s) acts as the user-facing ceiling.
query.max-execution-time=10m

# ── Query execution — PERF-001 ───────────────────────────────────────────────
query.max-stage-count=150

# Doubled from 4 → 8: more parallel tasks per stage for scan/aggregation on
# large Iceberg partitions (fact_trips spans 2018-2026, ~100 year/month partitions)
task.concurrency=8

# Doubled from 8 → 16: handle more concurrent Superset chart queries without
# queuing. Each dashboard panel fires an independent Trino query; 16 threads
# allows up to 16 simultaneous chart queries before thread contention occurs.
task.max-worker-threads=16

# Doubled from 8 → 16: more hash partitions for GROUP BY / JOIN operations.
# Larger partition count = smaller per-partition hash tables = less memory
# pressure per task, reducing spill frequency on aggregation-heavy charts.
query.max-hash-partition-count=16

# ── Memory killer policy — PERF-001 ──────────────────────────────────────────
# Gracefully kill the query consuming the most memory on blocked nodes instead
# of crashing the entire Trino process with OOM. Prevents one heavy dashboard
# query from taking down all concurrent chart queries.
query.low-memory-killer.policy=total-reservation-on-blocked-nodes

# ── Query optimizer (BUG-025) ────────────────────────────────────────────────
# Automatically reorder joins for optimal execution plan
optimizer.join-reordering-strategy=AUTOMATIC

# Pre-compute hash values to speed up hash joins and aggregations
optimizer.optimize-hash-generation=true

# ── Spill to disk (BUG-025) ──────────────────────────────────────────────────
# Allow large aggregations/joins to spill to disk instead of OOM-failing.
# Critical for complex multi-year NYC taxi report queries in Superset.
# Note: correct property name in Trino 435 is 'spiller-spill-path' (not 'spill-path')
spill-enabled=true
spiller-spill-path=/tmp/trino-spill
